<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storefront Checkout</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #e2e8f0; --muted: #94a3b8; --ok: #22c55e; --err: #ef4444; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; }
        .card { background: var(--card); width: 100%; max-width: 440px; border-radius: 16px; padding: 28px; box-shadow: 0 20px 50px rgba(0,0,0,.4); }
        h1 { margin: 0 0 4px; font-size: 22px; }
        p.sub { margin: 0 0 22px; color: var(--muted); font-size: 14px; }
        label { display: block; font-size: 13px; margin: 14px 0 6px; color: var(--muted); }
        input { width: 100%; padding: 11px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: var(--text); font-size: 15px; }
        input:focus { outline: none; border-color: var(--accent); }
        .row { display: flex; gap: 12px; }
        .row > div { flex: 1; }
        button { width: 100%; margin-top: 22px; padding: 13px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:disabled { opacity: .6; cursor: not-allowed; }
        .result { margin-top: 20px; padding: 16px; border-radius: 10px; font-size: 14px; display: none; }
        .result.ok { background: rgba(34,197,94,.12); border: 1px solid var(--ok); display: block; }
        .result.err { background: rgba(239,68,68,.12); border: 1px solid var(--err); display: block; }
        .result h3 { margin: 0 0 8px; font-size: 15px; }
        .kv { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; }
        .kv span:first-child { color: var(--muted); }
        .kv span:last-child { font-family: monospace; word-break: break-all; text-align: right; }
        .links { margin-top: 18px; text-align: center; font-size: 13px; }
        .links a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Secure Checkout</h1>
        <p class="sub">Pay with credit card via the Payment Gateway Service</p>

        <form id="payForm">
            <label for="cardHolderName">Cardholder name</label>
            <input id="cardHolderName" value="Jane Doe" required />

            <label for="cardNumber">Card number</label>
            <input id="cardNumber" value="4242 4242 4242 4242" inputmode="numeric" required />

            <div class="row">
                <div>
                    <label for="expiryMonth">Expiry month</label>
                    <input id="expiryMonth" type="number" min="1" max="12" value="12" required />
                </div>
                <div>
                    <label for="expiryYear">Expiry year</label>
                    <input id="expiryYear" type="number" min="2024" max="2100" value="2030" required />
                </div>
                <div>
                    <label for="cvv">CVV</label>
                    <input id="cvv" value="123" inputmode="numeric" required />
                </div>
            </div>

            <div class="row">
                <div>
                    <label for="amount">Amount</label>
                    <input id="amount" type="number" step="0.01" min="0.01" value="49.99" required />
                </div>
                <div>
                    <label for="currency">Currency</label>
                    <input id="currency" value="USD" required />
                </div>
            </div>

            <button id="payBtn" type="submit">Pay now</button>
        </form>

        <div id="result" class="result"></div>

        <div class="links">
            <a href="/swagger" target="_blank">API docs (Swagger)</a>
        </div>
    </div>

    <script>
        const form = document.getElementById("payForm");
        const result = document.getElementById("result");
        const btn = document.getElementById("payBtn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = "Processing...";
            result.className = "result";

            const payload = {
                cardHolderName: document.getElementById("cardHolderName").value,
                cardNumber: document.getElementById("cardNumber").value,
                expiryMonth: parseInt(document.getElementById("expiryMonth").value, 10),
                expiryYear: parseInt(document.getElementById("expiryYear").value, 10),
                cvv: document.getElementById("cvv").value,
                amount: parseFloat(document.getElementById("amount").value),
                currency: document.getElementById("currency").value
            };

            try {
                const res = await fetch("/api/payments", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (res.ok) {
                    result.className = "result ok";
                    result.innerHTML =
                        "<h3>Payment successful</h3>" +
                        kv("Reference", data.referenceNumber) +
                        kv("Transaction ID", data.transactionId) +
                        kv("Token", data.token) +
                        kv("Message", data.message);
                } else {
                    result.className = "result err";
                    result.innerHTML =
                        "<h3>Payment failed</h3>" +
                        kv("Reference", data.referenceNumber || "-") +
                        kv("Message", data.message || res.statusText);
                }
            } catch (err) {
                result.className = "result err";
                result.innerHTML = "<h3>Request error</h3><div>" + err.message + "</div>";
            } finally {
                btn.disabled = false;
                btn.textContent = "Pay now";
            }
        });

        function kv(label, value) {
            return '<div class="kv"><span>' + label + '</span><span>' + value + "</span></div>";
        }
    </script>
</body>
</html>
